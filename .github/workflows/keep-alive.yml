name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */3 * *'   # ogni 3 giorni alle 08:00 UTC (margine ampio sotto i 7gg di pausa Supabase)
  workflow_dispatch:          # consente avvio manuale dal pannello GitHub

permissions:
  contents: write             # necessario per l'heartbeat commit (evita auto-disable a 60gg)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase (tiene sveglio il progetto)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxydmtjaHF2anp5bmZ6ZXZwcWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NDY5NjksImV4cCI6MjA5MzIyMjk2OX0.XZXyUt9UNepHvr4HBLgCkywQYsXwtmvwYCsRrlAMBv4" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxydmtjaHF2anp5bmZ6ZXZwcWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NDY5NjksImV4cCI6MjA5MzIyMjk2OX0.XZXyUt9UNepHvr4HBLgCkywQYsXwtmvwYCsRrlAMBv4" \
            "https://lrvkchqvjzynfzevpqaj.supabase.co/rest/v1/app_version?select=id&limit=1")
          echo "Supabase risposta HTTP: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Progetto attivo"
          else
            echo "⚠️ Risposta inattesa: $STATUS"
            exit 1
          fi

      - name: Heartbeat commit se repo inattivo (evita auto-disable dei workflow a 60gg)
        run: |
          LAST=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST) / 86400 ))
          echo "Giorni dall'ultimo commit sul branch: $DAYS"
          if [ "$DAYS" -ge 45 ]; then
            echo "Repo vicino alla soglia di auto-disable (60gg): eseguo heartbeat commit"
            mkdir -p .github
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-keepalive.txt
            git config user.name "keepalive-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/last-keepalive.txt
            git commit -m "chore: keepalive heartbeat [skip ci]"
            git push
          else
            echo "Repo attivo di recente: nessun heartbeat necessario"
          fi
