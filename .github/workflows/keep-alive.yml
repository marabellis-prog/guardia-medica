name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */5 * *'   # ogni 5 giorni alle 08:00 UTC
  workflow_dispatch:          # consente avvio manuale dal pannello GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxydmtjaHF2anp5bmZ6ZXZwcWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NDY5NjksImV4cCI6MjA5MzIyMjk2OX0.XZXyUt9UNepHvr4HBLgCkywQYsXwtmvwYCsRrlAMBv4" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxydmtjaHF2anp5bmZ6ZXZwcWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NDY5NjksImV4cCI6MjA5MzIyMjk2OX0.XZXyUt9UNepHvr4HBLgCkywQYsXwtmvwYCsRrlAMBv4" \
            "https://lrvkchqvjzynfzevpqaj.supabase.co/rest/v1/app_version?select=id&limit=1")
          echo "Supabase risposta HTTP: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Progetto attivo"
          else
            echo "⚠️ Risposta inattesa: $STATUS"
            exit 1
          fi
